<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskify • Access Your Task Board</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="login.css">
  <script src="login.js" defer></script>
</head>
<body class="dark-theme">

  <!-- Aurora Background Glows -->
  <div class="aurora-glow glow-1"></div>
  <div class="aurora-glow glow-2"></div>

  <div class="login-container">
    
    <div class="glass-panel login-card">
      
      <!-- Brand Logo / Header -->
      <div class="brand-header">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
            <polyline points="10 14 12 16 16 12"></polyline>
          </svg>
        </div>
        <h1 class="brand-title">Taskify</h1>
        <p class="brand-tagline" id="form-tagline">Sign in to organize your tasks</p>
      </div>

      <!-- Sign In / Sign Up Form -->
      <form id="auth-form" novalidate>
        
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="input-field" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-field" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <!-- Alert messages box -->
        <div id="alert-box" class="alert-box" style="display: none;"></div>

        <button type="submit" id="btn-submit" class="btn btn-primary btn-block">
          Sign In
        </button>

      </form>

      <!-- Toggle Mode Link -->
      <div class="toggle-mode-container">
        <span id="toggle-text">New to Taskify?</span>
        <button id="toggle-auth-mode" class="btn-link">Create an Account</button>
      </div>

    </div>

  </div>

</body>
</html>
